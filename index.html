<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Serverless Feedback App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Feedback Form</h1>
        <p>Help us improve by sharing your valuable feedback.</p>

        <form id="feedbackForm">

            <label>Full Name</label>
            <input
                type="text"
                id="name"
                placeholder="Enter your full name"
                required
            >

            <label>Email</label>
            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required
            >

            <label>Feedback</label>

            <textarea
                id="feedback"
                rows="6"
                placeholder="Write your feedback..."
                required
            ></textarea>

            <button
                type="submit"
                id="submitBtn"
            >
                Submit Feedback
            </button>

        </form>

        <div id="message"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
